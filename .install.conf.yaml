- defaults:
    link:
      create: true
      relink: true
    shell:
      quiet: true

- clean: ['~', '~/.config', '~/.gnupg', '~/.config/uv']

- link:
    ~/.agignore:
    ~/.bash:
    ~/.bash_profile:
    ~/.bashrc:
    ~/.claude/settings.json: claude/settings.json
    ~/.dotfiles: ''
    ~/.editrc:
    ~/.emacs.d:
    ~/.emacs:
    ~/.gitconfig:
    ~/.gitignore_global:
    ~/.gnupg/gpg.conf: gnupg/gpg.conf
    ~/.haskeline:
    ~/.hgrc:
    ~/.inputrc:
    ~/.ipython/profile_default/ipython_config.py: ipython/ipython_config.py
    ~/.ipython/profile_default/ipython_kernel_config.py: ipython/ipython_kernel_config.py
    ~/.ipython/profile_default/startup/disable_warnings.py: ipython/disable_warnings.py
    ~/.pythonrc:
    ~/.screenrc:
    ~/.shell:
    ~/.tmux.conf:
    ~/.vim:
    ~/.vimrc:
    ~/.zsh:
    ~/.zshrc:

- shell:
  - git submodule sync --recursive
  # the following have to run after linking ~/.gitconfig
  - git update-submodules
  - >-
    git cleanall -f
    emacs.d/vendor/
    irssi/scripts/vendor/
    shell/plugins/
    vim/pack/vendor/start/
    zsh/plugins/
